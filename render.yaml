services:
  - type: redis
    name: nara-redis
    plan: free
    maxCPU: 0.5
    maxMemory: 256

  - type: web
    name: nara-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --workers 2 --threads 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: nara-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: nara-db
      - key: REDIS_URL
        fromService:
          name: nara-redis
          type: redis
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:8081,exp://127.0.0.1:8081
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        value: NARA
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: NARA <no-reply@nara.ng>

  - type: worker
    name: nara-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: nara-db
      - key: REDIS_URL
        fromService:
          name: nara-redis
          type: redis

databases:
  - name: nara-db
    type: postgresql
    plan: free
